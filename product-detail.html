<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails du Produit - MyStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo-container"><a href="index.html"><img src="images/logo.png" alt="MyStore Logo"
                            class="logo-img"></a></div>
                <nav class="nav">
                    <ul>
                        <li><a href="index.html">Accueil</a></li>
                        <li><a href="index.html#products">Produits</a></li>
                        <li><a href="cart.html" class="cart-link">
                                Panier <span class="cart-count">0</span>
                            </a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <section class="product-detail-section">
            <div class="container">
                <a href="index.html" class="back-link">← Retour aux produits</a>

                <div class="product-detail-container">
                    <div class="product-image">
                        <img id="detailProductImage" src="" alt="">
                    </div>
                    <div class="product-details">
                        <h1 id="detailProductName"></h1>
                        <div class="rating">
                            <span class="stars">★★★★★</span>
                            <span class="review-count">(150 avis)</span>
                        </div>
                        <p class="price" id="detailProductPrice"></p>
                        <p class="description" id="detailProductDescription"></p>

                        <div class="product-specs">
                            <h3>Caractéristiques</h3>
                            <ul id="specsList">
                                <!-- Specs will be loaded here -->
                            </ul>
                        </div>

                        <div class="purchase-section">
                            <div class="quantity-selector">
                                <label for="detailQuantity">Quantité:</label>
                                <input type="number" id="detailQuantity" min="1" value="1">
                            </div>
                            <button id="detailAddToCartBtn" class="btn btn-primary btn-large">Ajouter au panier</button>
                        </div>

                        <div class="product-info-box">
                            <p><strong>Disponibilité:</strong> <span id="availability" class="available">En stock</span>
                            </p>
                            <p><strong>Livraison:</strong> Livraison gratuite pour les commandes supérieures à 200 DH
                            </p>
                            <p><strong>Garantie:</strong> Garantie d'un an</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Related Products Section -->
        <section class="related-products">
            <div class="container">
                <h2>Produits Connexes</h2>
                <div class="products-grid" id="relatedProductsContainer">
                    <!-- Related products will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MyStore. Tous droits réservés.</p>
        </div>
    </footer>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script src="js/data.js"></script>
    <script src="js/product-detail.js"></script>
</body>

</html>
